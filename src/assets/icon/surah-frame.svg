<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="100%" height="100%">
  <defs>
    <!-- Rich Gold Gradient -->
    <linearGradient id="gold" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#DEB841"/>
      <stop offset="25%" stop-color="#F9EB9F"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="75%" stop-color="#8E6A1C"/>
      <stop offset="100%" stop-color="#F1D44D"/>
    </linearGradient>

    <!-- Base Teal Color (Slightly lighter than app theme) -->
    <linearGradient id="tealBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4db8b8"/>
      <stop offset="50%" stop-color="#2d9e9e"/>
      <stop offset="100%" stop-color="#1a8a8a"/>
    </linearGradient>

    <!-- Dark Teal for shadow and depth -->
    <linearGradient id="tealDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a8a8a"/>
      <stop offset="100%" stop-color="#0a3540"/>
    </linearGradient>

    <!-- Card Background representing the main app theme -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a4a5a"/>
      <stop offset="100%" stop-color="#0a3540"/>
    </linearGradient>

    <!-- A basic Jepara leaf element (Daun Trubusan) -->
    <g id="jepara-leaf">
      <path d="M0,0 C15,-20 40,-20 50,0 C40,5 20,15 0,0 Z" fill="url(#tealBase)" stroke="url(#gold)" stroke-width="1.2"/>
      <path d="M5,-2 C20,-10 35,-10 45,-2 C35,2 20,6 5,-2 Z" fill="url(#tealDark)"/>
      <path d="M0,0 Q25,-5 48,0" fill="none" stroke="url(#gold)" stroke-width="0.8"/>
    </g>

    <g id="jepara-leaf-small">
      <use href="#jepara-leaf" transform="scale(0.7)"/>
    </g>

    <!-- A carving curling vine with leaves -->
    <g id="vine-curve">
      <!-- Main stalk -->
      <path d="M0,0 C30,40 70,-40 100,0 C130,40 170,-40 200,0" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
      <path d="M0,0 C30,40 70,-40 100,0 C130,40 170,-40 200,0" fill="none" stroke="url(#tealBase)" stroke-width="5" opacity="0.6"/>
      
      <!-- Attaching leaves along the stalk -->
      <use href="#jepara-leaf" x="15" y="15" transform="rotate(45 15 15)"/>
      <use href="#jepara-leaf" x="35" y="-15" transform="rotate(-60 35 -15)"/>
      <use href="#jepara-leaf-small" x="60" y="-5" transform="rotate(-20 60 -5)"/>
      <use href="#jepara-leaf-small" x="85" y="20" transform="rotate(70 85 20)"/>
      
      <use href="#jepara-leaf" x="115" y="-15" transform="rotate(-45 115 -15)"/>
      <use href="#jepara-leaf" x="135" y="15" transform="rotate(60 135 15)"/>
      <use href="#jepara-leaf-small" x="160" y="5" transform="rotate(20 160 5)"/>
      <use href="#jepara-leaf-small" x="185" y="-20" transform="rotate(-70 185 -20)"/>

      <!-- Inner spirals (ulir pakis) common in Jepara -->
      <path d="M35,-15 C45,-30 65,-20 50,-5 C40,5 30,-5 35,-15 Z" fill="url(#tealDark)" stroke="url(#gold)" stroke-width="1.5"/>
      <circle cx="47" cy="-12" r="2" fill="url(#gold)"/>
      
      <path d="M135,15 C145,30 165,20 150,5 C140,-5 130,5 135,15 Z" fill="url(#tealDark)" stroke="url(#gold)" stroke-width="1.5"/>
      <circle cx="147" cy="12" r="2" fill="url(#gold)"/>
    </g>

    <g id="vine-curve-flipped">
      <use href="#vine-curve" transform="matrix(-1 0 0 -1 200 0)"/>
    </g>

    <!-- Jepara Flower Focus -->
    <g id="jepara-flower">
      <!-- Outer radiating petals -->
      <path d="M0,-16 C10,-24 20,-10 16,0 C24,10 10,20 0,16 C-10,24 -20,10 -16,0 C-24,-10 -10,-20 0,-16 Z" fill="url(#tealBase)" stroke="url(#gold)" stroke-width="2"/>
      <!-- Inner core -->
      <circle cx="0" cy="0" r="8" fill="url(#tealDark)" stroke="url(#gold)" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="4" fill="url(#gold)"/>
      <circle cx="0" cy="0" r="1.5" fill="#0f4c5c"/>
      <!-- Small decorative dots around -->
      <circle cx="0" cy="-20" r="1.5" fill="url(#gold)"/>
      <circle cx="0" cy="20" r="1.5" fill="url(#gold)"/>
      <circle cx="-20" cy="0" r="1.5" fill="url(#gold)"/>
      <circle cx="20" cy="0" r="1.5" fill="url(#gold)"/>
    </g>

    <!-- The Dense Jepara Pattern -->
    <pattern id="jepara-pattern" x="0" y="0" width="200" height="120" patternUnits="userSpaceOnUse">
       <!-- Layer 1: Vines flowing right -->
       <use href="#vine-curve" x="0" y="30"/>
       <use href="#vine-curve" x="0" y="90"/>
       <!-- Layer 2: Vines flowing left -->
       <use href="#vine-curve-flipped" x="0" y="30"/>
       <use href="#vine-curve-flipped" x="0" y="90"/>
       
       <!-- Crossings where we place flowers -->
       <use href="#jepara-flower" x="0" y="60" transform="scale(0.8)"/>
       <use href="#jepara-flower" x="100" y="60" transform="scale(1.1)"/>
       <use href="#jepara-flower" x="200" y="60" transform="scale(0.8)"/>
       
       <use href="#jepara-flower" x="50" y="0" transform="scale(0.6)"/>
       <use href="#jepara-flower" x="150" y="0" transform="scale(0.6)"/>
       <use href="#jepara-flower" x="50" y="120" transform="scale(0.6)"/>
       <use href="#jepara-flower" x="150" y="120" transform="scale(0.6)"/>
    </pattern>
  </defs>

  <!-- Solid App Background matching app header -->
  <rect x="0" y="0" width="800" height="120" fill="#0a3540"/>

  <!-- Outer Carved Frame -->
  <rect x="4" y="4" width="792" height="112" rx="10" fill="url(#cardBg)" stroke="url(#gold)" stroke-width="3"/>
  
  <!-- Carved Ornaments Filling the space -->
  <rect x="10" y="10" width="780" height="100" rx="6" fill="url(#jepara-pattern)" stroke="#2d9e9e" stroke-width="2"/>

  <!-- Center Plaque for the Surah Title -->
  <g transform="translate(400, 60)">
     <!-- Outer Drop Shadow -->
     <path d="M-220,-48 L220,-48 C245,-48 260,-20 260,0 C260,20 245,48 220,48 L-220,48 C-245,48 -260,20 -260,0 C-260,-20 -245,-48 -220,-48 Z" fill="#000000" opacity="0.6" transform="translate(0, 4)"/>
     
     <!-- Outer Gold Rim of the plaque with Solid White Base -->
     <path d="M-220,-48 L220,-48 C245,-48 260,-20 260,0 C260,20 245,48 220,48 L-220,48 C-245,48 -260,20 -260,0 C-260,-20 -245,-48 -220,-48 Z" fill="#ffffff" stroke="url(#gold)" stroke-width="4"/>
  </g>

  <!-- Ornate Corner Overlays -->
  <g fill="url(#tealBase)" stroke="url(#gold)" stroke-width="2">
     <!-- Top-Left overlay -->
     <path d="M10,10 L50,10 C50,25 25,50 10,50 Z"/>
     <!-- Top-Right overlay -->
     <path d="M790,10 L750,10 C750,25 775,50 790,50 Z"/>
     <!-- Bottom-Left overlay -->
     <path d="M10,110 L50,110 C50,95 25,70 10,70 Z"/>
     <!-- Bottom-Right overlay -->
     <path d="M790,110 L750,110 C750,95 775,70 790,70 Z"/>
     
     <!-- Gold dots embedded in the corners -->
     <circle cx="20" cy="20" r="4" fill="url(#gold)"/>
     <circle cx="780" cy="20" r="4" fill="url(#gold)"/>
     <circle cx="20" cy="100" r="4" fill="url(#gold)"/>
     <circle cx="780" cy="100" r="4" fill="url(#gold)"/>
     
     <!-- Additional corner details -->
     <path d="M28,28 L38,38 M772,28 L762,38 M28,92 L38,82 M772,92 L762,82" stroke="url(#gold)" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
