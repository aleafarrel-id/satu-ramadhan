<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#1A2B3A" />
    <meta name="description" content="Aplikasi waktu sholat dan jadwal puasa Ramadhan berdasarkan lokasi" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: https://ssl.gstatic.com 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://api.aladhan.com https://*.openstreetmap.org; img-src 'self' data: blob: https://*.openstreetmap.org; style-src 'self' 'unsafe-inline'; font-src 'self' data:;" />
    <link rel="icon" type="image/png" href="/favicon/favicon.png" />

    <!-- Preload Critical Fonts -->
    <link rel="preload" href="/src/assets/font/poppins/Poppins-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/src/assets/font/poppins/Poppins-Bold.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/src/assets/font/poppins/Poppins-SemiBold.woff2" as="font" type="font/woff2"
        crossorigin />
    <link rel="preload" href="/src/assets/font/quran/LPMQ-IsepMisbah.ttf" as="font" type="font/ttf" crossorigin />
    <link rel="preload" href="/src/assets/font/quran/DecoType-Thuluth-Regular.ttf" as="font" type="font/ttf"
        crossorigin />
    <link rel="preload" href="/src/assets/font/quran/DecoType-Thuluth-II-Regular.ttf" as="font" type="font/ttf"
        crossorigin />

    <link rel="stylesheet" href="/src/css/main.css">
    <link rel="stylesheet" href="/src/assets/vendor/boxicons/css/boxicons.min.css" />
    <title>Satu Ramadhan</title>
</head>

<body style="background: #0a3540">
    <div id="app">

        <!-- Splash Screen -->
        <div class="splash-screen" id="splash-screen">
            <div class="splash-content">
                <h1 class="splash-title">&nbsp;</h1>
                <p class="splash-subtitle" id="splash-subtitle">&nbsp;</p>
                <div class="splash-logo-wrapper">
                    <img src="/favicon/favicon.png" alt="Satu Ramadhan" class="splash-logo" />
                </div>
            </div>
            <div class="splash-footer">
                <div class="splash-loading-bar">
                    <div class="splash-loading-fill" id="splash-loading-fill"></div>
                </div>
                <p class="splash-loading-text" id="splash-loading-text">&nbsp;</p>
                <p class="splash-version" id="splash-version"></p>
            </div>
        </div>

        <!-- Main App -->
        <div class="app-container" id="app-container">
            <!-- Header -->
            <header class="app-header" id="app-header"></header>

            <!-- Scrollable Content Area -->
            <main class="app-content" id="app-content">
                <div class="page active" id="page-home"></div>
                <div class="page" id="page-schedule"></div>
                <div class="page" id="page-compass"></div>
                <div class="page" id="page-quran"></div>
                <div class="page" id="page-settings"></div>
            </main>

            <!-- Bottom Navigation -->
            <nav class="bottom-nav" id="bottom-nav"></nav>
        </div>

        <!-- Quran Mode Backdrop -->
        <div class="quran-backdrop" id="quran-backdrop">
            <div class="quran-backdrop-content">
                <i class='bx bx-book-reader'></i>
                <span>Al-Qur'an</span>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
